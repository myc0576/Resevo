name: Resevo CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install -e .
      - run: python -c "import resevo; print(resevo.__version__)"
      - run: resevo --help
      - run: resevo --root "$RUNNER_TEMP/resevo-workspace" init
      - run: resevo --root "$RUNNER_TEMP/resevo-workspace" doctor
      - run: PYTEST_DISABLE_PLUGIN_AUTOLOAD=1 python -m pytest -q
