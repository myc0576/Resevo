<text x="800" y="755" text-anchor="middle"><tspan x="800" class="node-zh">反馈回路</tspan><tspan x="800" dy="27" class="node-en">Feedback Loop</tspan></text>
<text x="800" y="806" text-anchor="middle"><tspan x="800" class="micro-zh">已验证记忆服务后续任务，新工作继续产生证据</tspan><tspan x="800" dy="17" class="micro-en">validated memory informs future tasks; new work creates new evidence</tspan></text>
<rect x="80" y="790" width="360" height="52" rx="26" fill="#F4EFE8" stroke="#C99A4A" stroke-width="2"/>
<text x="260" y="811" text-anchor="middle"><tspan x="260" class="pill-zh">证据来自真实工作</tspan><tspan x="260" dy="17" class="pill-en">EVIDENCE COMES FROM REAL WORK</tspan></text>
</svg>
