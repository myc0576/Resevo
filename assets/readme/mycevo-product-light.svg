<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="product-light-title product-light-desc">
<title id="product-light-title">MycEvo 如何持续进化科研工作流 / How MycEvo Evolves a Research Workflow</title>
<desc id="product-light-desc">真实科研任务产生证据，证据先进入候选工作流记忆。验证门禁阻止静默晋升，只有通过验证的经验才能成为服务下一篇论文的可复用工作流，并继续产生反馈和新证据。 Real research tasks create evidence that enters candidate workflow memory. A validation gate blocks silent promotion; only validated lessons become reusable.</desc>
<defs>
  <marker id="product-light-arrow" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="10" markerHeight="10" orient="auto-start-reverse"><path d="M1 1 L11 6 L1 11 Z" fill="#2F2A26"/></marker>
  <marker id="product-light-forest-arrow" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="10" markerHeight="10" orient="auto-start-reverse"><path d="M1 1 L11 6 L1 11 Z" fill="#405A47"/></marker>
  <style>
    text { font-family: Inter, Arial, system-ui, Noto Sans SC, Microsoft YaHei, PingFang SC, sans-serif; fill: #2F2A26; }
    .brow-zh { font-size: 16px; font-weight: 750; letter-spacing: 1.5px; fill: #405A47; }
    .brow-en { font-size: 11px; font-weight: 700; letter-spacing: 1.4px; fill: #405A47; }
    .title-zh { font-size: 38px; font-weight: 760; }
    .title-en { font-size: 25px; font-weight: 680; }
    .sub-zh { font-size: 16px; fill: #746B63; }
    .sub-en { font-size: 13px; fill: #746B63; }
    .node-zh { font-size: 22px; font-weight: 750; }
    .node-en { font-size: 15px; font-weight: 680; }
    .micro-zh { font-size: 13px; fill: #746B63; }
    .micro-en { font-size: 10px; fill: #746B63; }
    .pill-zh { font-size: 13px; font-weight: 760; letter-spacing: .6px; }
    .pill-en { font-size: 9px; font-weight: 720; letter-spacing: .7px; }
    .flow { fill: none; stroke: #2F2A26; stroke-width: 5; stroke-linecap: round; marker-end: url(#product-light-arrow); }
    .feedback { fill: none; stroke: #405A47; stroke-width: 5; stroke-linecap: round; marker-end: url(#product-light-forest-arrow); }
  </style>
</defs>
<rect width="1600" height="900" fill="#F7F3EA"/>
<rect x="38" y="38" width="1524" height="824" rx="28" fill="#FFFDF8" stroke="#D9CEC2" stroke-width="2"/>
<text x="78" y="76"><tspan x="78" class="brow-zh">证据治理的持续进化</tspan><tspan x="78" dy="19" class="brow-en">EVIDENCE-GOVERNED EVOLUTION</tspan></text>
<text x="78" y="137"><tspan x="78" class="title-zh">MycEvo 如何持续进化科研工作流</tspan><tspan x="78" dy="36" class="title-en">How MycEvo Evolves a Research Workflow</tspan></text>
<text x="80" y="207"><tspan x="80" class="sub-zh">每个任务都会产生证据，只有通过验证的经验才能复用。</tspan><tspan x="80" dy="23" class="sub-en">Every task creates evidence. Only validated lessons become reusable.</tspan></text>
<line x1="80" y1="255" x2="1520" y2="255" stroke="#D9CEC2" stroke-width="2"/>

<path d="M270 455 H310 M510 455 H550 M770 455 H810 M1050 455 H1090 M1310 455 H1350" class="flow"/>

<g aria-label="真实科研任务 / Real Research Tasks">
  <rect x="80" y="320" width="190" height="290" rx="22" fill="#FFFDF8" stroke="#D9CEC2" stroke-width="3"/>
  <circle cx="122" cy="360" r="13" fill="#C99A4A"/>
  <path d="M151 360 H230 M111 398 H236 M111 424 H220" stroke="#68775A" stroke-width="8" stroke-linecap="round"/>
  <text x="175" y="478" text-anchor="middle"><tspan x="175" class="node-zh">真实科研任务</tspan><tspan x="175" dy="29" class="node-en">Real Research Tasks</tspan></text>
  <text x="175" y="551" text-anchor="middle"><tspan x="175" class="micro-zh">论文 · 代码 · 评审</tspan><tspan x="175" dy="20" class="micro-en">paper · code · review</tspan></text>
</g>

<g aria-label="证据捕获 / Evidence Capture">
  <rect x="334" y="346" width="160" height="245" rx="18" fill="#F4EFE8" stroke="#D9CEC2" stroke-width="2"/>
  <rect x="320" y="320" width="180" height="290" rx="18" fill="#FFFDF8" stroke="#D9CEC2" stroke-width="3"/>
  <path d="M352 365 H468 M352 398 H451 M352 431 H473" stroke="#D97757" stroke-width="7" stroke-linecap="round"/>
  <text x="410" y="478" text-anchor="middle"><tspan x="410" class="node-zh">证据捕获</tspan><tspan x="410" dy="29" class="node-en">Evidence Capture</tspan></text>
  <text x="410" y="551" text-anchor="middle"><tspan x="410" class="micro-zh">轨迹 · 差异 · 输出</tspan><tspan x="410" dy="20" class="micro-en">traces · diffs · outputs</tspan></text>
</g>

<g aria-label="候选工作流记忆 / Candidate Workflow Memory">
  <rect x="550" y="305" width="220" height="315" rx="28" fill="#F4EFE8" stroke="#746B63" stroke-width="3" stroke-dasharray="11 9"/>
  <path d="M606 368 C638 344 680 345 714 371 M606 368 C634 399 676 407 714 371" fill="none" stroke="#68775A" stroke-width="4"/>
  <circle cx="606" cy="368" r="11" fill="#68775A"/><circle cx="660" cy="357" r="11" fill="#C99A4A"/><circle cx="714" cy="371" r="11" fill="#D97757"/>
  <rect x="590" y="421" width="140" height="48" rx="22" fill="#FFFDF8" stroke="#746B63" stroke-width="2"/>
  <text x="660" y="441" text-anchor="middle"><tspan x="660" class="pill-zh">候选</tspan><tspan x="660" dy="16" class="pill-en">CANDIDATE</tspan></text>
  <text x="660" y="509" text-anchor="middle"><tspan x="660" class="node-zh">工作流记忆</tspan><tspan x="660" dy="28" class="node-en">Workflow Memory</tspan></text>
  <text x="660" y="577" text-anchor="middle"><tspan x="660" class="micro-zh">暂存，不自动晋升</tspan><tspan x="660" dy="19" class="micro-en">held, not promoted</tspan></text>
</g>

<g aria-label="验证门禁 / Validation Gate">
  <rect x="810" y="285" width="240" height="350" rx="30" fill="#F9E6DE" stroke="#D97757" stroke-width="5"/>
  <circle cx="930" cy="345" r="36" fill="#D97757"/>
  <path d="M930 324 V366 M909 345 H951" stroke="#FFFDF8" stroke-width="8" stroke-linecap="round"/>
  <text x="930" y="415" text-anchor="middle"><tspan x="930" class="node-zh">验证门禁</tspan><tspan x="930" dy="29" class="node-en">Validation Gate</tspan></text>
  <line x1="852" y1="476" x2="1008" y2="476" stroke="#D97757" stroke-width="3"/>
  <text x="930" y="510" text-anchor="middle"><tspan x="930" class="micro-zh">证据检查</tspan><tspan x="930" dy="20" class="micro-en">evidence check</tspan></text>
  <text x="930" y="566" text-anchor="middle"><tspan x="930" class="micro-zh">人工控制状态</tspan><tspan x="930" dy="20" class="micro-en">human-controlled status</tspan></text>
</g>
<rect x="815" y="650" width="230" height="54" rx="27" fill="#D97757"/>
<text x="930" y="672" text-anchor="middle" style="fill:#2F2A26"><tspan x="930" class="pill-zh">禁止静默晋升</tspan><tspan x="930" dy="17" class="pill-en">NO SILENT PROMOTION</tspan></text>

<g aria-label="可复用工作流 / Reusable Workflow">
  <rect x="1090" y="320" width="220" height="290" rx="26" fill="#E7ECE3" stroke="#405A47" stroke-width="4"/>
  <rect x="1136" y="352" width="128" height="76" rx="18" fill="#405A47"/>
  <path d="M1170 389 L1190 409 L1232 366" fill="none" stroke="#FFFDF8" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="1200" y="478" text-anchor="middle"><tspan x="1200" class="node-zh">可复用工作流</tspan><tspan x="1200" dy="29" class="node-en">Reusable Workflow</tspan></text>
  <text x="1200" y="551" text-anchor="middle"><tspan x="1200" class="micro-zh">已验证 · 已版本化</tspan><tspan x="1200" dy="20" class="micro-en">validated · versioned</tspan></text>
</g>

<g aria-label="下一篇论文 / Next Paper">
  <path d="M1350 320 H1492 L1520 348 V610 H1350 Z" fill="#FFFDF8" stroke="#D9CEC2" stroke-width="3" stroke-linejoin="round"/>
  <path d="M1492 320 V348 H1520" fill="#F4EFE8" stroke="#D9CEC2" stroke-width="3"/>
  <path d="M1384 366 H1480 M1384 400 H1466 M1384 434 H1490" stroke="#68775A" stroke-width="6" stroke-linecap="round"/>
  <text x="1435" y="478" text-anchor="middle"><tspan x="1435" class="node-zh">下一篇论文</tspan><tspan x="1435" dy="29" class="node-en">Next Paper</tspan></text>
  <text x="1435" y="551" text-anchor="middle"><tspan x="1435" class="micro-zh">应用已验证模式</tspan><tspan x="1435" dy="20" class="micro-en">applies the pattern</tspan></text>
</g>

