<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="technical-light-title technical-light-desc">
<title id="technical-light-title">MycEvo 技术架构 / MycEvo Technical Architecture</title>
<desc id="technical-light-desc">外部智能体通过 CLI 或 stdio MCP 访问公共 MycEvo 核心，再服务私有科研工作区。候选记忆必须经过留出验证、证据门禁与人工晋升才能复用；脱敏候选可经验证和评审改进公共引擎，原始私有证据始终留在本地。 External agents access the public core through CLI or stdio MCP and serve a private research workspace with evidence-gated evolution.</desc>
<defs>
  <marker id="technical-light-arrow" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="10" markerHeight="10" orient="auto-start-reverse"><path d="M1 1 L11 6 L1 11 Z" fill="#2F2A26"/></marker>
  <marker id="technical-light-forest-arrow" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="10" markerHeight="10" orient="auto-start-reverse"><path d="M1 1 L11 6 L1 11 Z" fill="#405A47"/></marker>
  <style>
    text { font-family: Inter, Arial, system-ui, Noto Sans SC, Microsoft YaHei, PingFang SC, sans-serif; fill: #2F2A26; }
    .brow-zh { font-size: 14px; font-weight: 760; letter-spacing: 1px; fill: #405A47; }
    .brow-en { font-size: 10px; font-weight: 720; letter-spacing: 1.1px; fill: #405A47; }
    .title-zh { font-size: 36px; font-weight: 760; }
    .title-en { font-size: 25px; font-weight: 680; }
    .sub-zh { font-size: 15px; fill: #746B63; }
    .sub-en { font-size: 12px; fill: #746B63; }
    .node-zh { font-size: 19px; font-weight: 750; }
    .node-en { font-size: 13px; font-weight: 680; }
    .small-zh { font-size: 14px; font-weight: 650; }
    .small-en { font-size: 10px; fill: #746B63; }
    .micro-zh { font-size: 12px; fill: #746B63; }
    .micro-en { font-size: 9px; fill: #746B63; }
    .flow { fill: none; stroke: #2F2A26; stroke-width: 5; stroke-linecap: round; marker-end: url(#technical-light-arrow); }
    .feedback { fill: none; stroke: #405A47; stroke-width: 5; stroke-linecap: round; marker-end: url(#technical-light-forest-arrow); }
  </style>
</defs>
<rect width="1600" height="900" fill="#F7F3EA"/>
<rect x="38" y="38" width="1524" height="824" rx="28" fill="#FFFDF8" stroke="#D9CEC2" stroke-width="2"/>
<text x="72" y="72"><tspan x="72" class="brow-zh">本地 CLI + MCP 外部科研大脑</tspan><tspan x="72" dy="18" class="brow-en">LOCAL CLI + MCP EXTERNAL RESEARCH BRAIN</tspan></text>
<text x="72" y="130"><tspan x="72" class="title-zh">MycEvo 技术架构</tspan><tspan x="72" dy="34" class="title-en">MycEvo Technical Architecture</tspan></text>
<text x="74" y="199"><tspan x="74" class="sub-zh">基于本地 CLI 与 MCP 的外部大脑，以证据门禁控制持续进化。</tspan><tspan x="74" dy="21" class="sub-en">A local CLI and MCP external brain with evidence-gated evolution.</tspan></text>

