<svg xmlns="http://www.w3.org/2000/svg" width="720" height="120" viewBox="0 0 720 120" role="img" aria-labelledby="title desc">
  <title id="title">Minimal visual-to-editable workflow</title>
  <desc id="desc">Text-only SVG fixture showing source, route, external reconstruction, output, and closeout.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155" />
    </marker>
  </defs>
  <g fill="#f8fafc" stroke="#334155" stroke-width="1.5">
    <rect x="10" y="36" width="120" height="48" rx="6" />
    <rect x="160" y="36" width="120" height="48" rx="6" />
    <rect x="310" y="36" width="120" height="48" rx="6" />
    <rect x="460" y="36" width="120" height="48" rx="6" />
    <rect x="610" y="36" width="100" height="48" rx="6" />
  </g>
  <g stroke="#334155" stroke-width="1.5" marker-end="url(#arrow)">
    <line x1="130" y1="60" x2="155" y2="60" />
    <line x1="280" y1="60" x2="305" y2="60" />
    <line x1="430" y1="60" x2="455" y2="60" />
    <line x1="580" y1="60" x2="605" y2="60" />
  </g>
  <g font-family="Arial, sans-serif" font-size="12" fill="#111827" text-anchor="middle">
    <text x="70" y="56">Visual source</text>
    <text x="70" y="72">reference</text>
    <text x="220" y="56">Route</text>
    <text x="220" y="72">classification</text>
    <text x="370" y="56">External skill</text>
    <text x="370" y="72">execution</text>
    <text x="520" y="56">Editable asset</text>
    <text x="520" y="72">output</text>
    <text x="660" y="56">Loop</text>
    <text x="660" y="72">closeout</text>
  </g>
</svg>

