version: 1
name: Resevo
description: 'Resevo: Evidence-Governed Self-Evolving Research Workflow Harness.'

brand:
  name: Resevo
  positioning: 'Evidence-Governed Self-Evolving Research Workflow Harness'
  local_directory_note: 'The repository brand and canonical local entry are configured by the user; historical researchloop and research-harness identifiers remain only for compatibility.'

paths:
  workspace_root: ''
  harness_root: ''
  primary_project: ''
  paper_docs_root: ''
  reusable_knowledge_root: ''
  reusable_prompts_root: ''
  removed_legacy_reference: ''

path_resolution:
  canonical_harness_root: '<configured-engine-root>'
  harness_write_root: '<configured-engine-root>'
  phrase_harness_means: '<configured-engine-root>'
  phrase_knowledge_base_means: '<configured-knowledge-root>'
  small_paper_outputs_default_root: '<configured-paper-docs-root>/<paper_id>'
  legacy_read_only_references: []
  removed_legacy_references:
    - '<legacy-knowledge-root>\_harness'
  deprecated_or_ambiguous_paths:
    - '<knowledge-root>\_harness'
    - '<legacy-knowledge-root>\_harness'
  forbidden_harness_write_roots:
    - '<knowledge-root>\_harness'
    - '<legacy-knowledge-root>\_harness'

registries:
  projects: 'registry/projects.yaml'
  knowledge: 'registry/knowledge.yaml'
  prompts: 'registry/prompts.yaml'
  research_assets: 'registry/research_assets.yaml'
  papers: 'registry/papers.yaml'
  literature: 'registry/literature.yaml'
  figures: 'registry/figures.yaml'
  output_objects: 'registry/output_objects.yaml'
  asset_evolution: 'registry/asset_evolution.yaml'
  workflow_improvement_backlog: 'registry/workflow_improvement_backlog.yaml'
  decisions: 'registry/decisions.yaml'
  visual_to_editable_skills: 'registry/visual_to_editable_skills.yaml'
  ppt_assets: 'registry/ppt_assets.yaml'
  model_assets: 'registry/model_assets.yaml'
  feedback: 'registry/feedback.yaml'

automation:
  scripts_root: 'scripts'
  runs_root: 'runs'
  state_root: 'state'
  evolution_ledger: 'state/evolution_ledger.jsonl'
  snapshots_root: 'state/snapshots'
  quality_evaluation: 'scripts/evaluator.py'
  project_health: 'scripts/project_health.py'
  evolution_proposals: 'scripts/evolve_proposals.py'
  daily_cycle: 'scripts/daily_cycle.py'
  war_room: 'scripts/war_room.py'
  self_evolution_loop: 'scripts/self_evolution_loop.py'
  self_evolution_workflow: 'workflows/self_evolution_loop/README.md'
  self_evolution_intake_template: 'templates/self_evolution_intake.yaml'
  self_evolution_contract_template: 'templates/self_evolution_contract.md'
  visual_to_editable_router: 'scripts/visual_to_editable_router.py'
  visual_to_editable_workflow: 'workflows/visual_to_editable/README.md'
  visual_to_editable_rules: 'workflows/visual_to_editable/router_rules.yaml'

search:
  canonical_engine: sqlite_fts5
  sqlite_path: 'state/kb_index/research_kb.sqlite'
  mcp_server: 'mcp/resevo_mcp.py'
  openviking_status: legacy_optional_noncanonical
  openviking_cleanup_inventory: 'reports/openviking_cleanup_inventory.md'

quality:
  score_total: 100
  scoring_weights:
    form_completeness: 30
    content_validity: 30
    reproducibility: 30
    reference_reuse: 10
  levels:
    bronze: form check passes
    silver: has verification evidence and reproduction entry
    gold: reused or referenced by later project work
  hard_failures:
    - missing_path
    - bad_encoding
    - forbidden_harness_path
    - validated_without_evidence
    - research_asset_missing_manifest
    - research_asset_missing_reproduction_entry
    - visual_reconstruction_missing_qa
    - visual_reconstruction_forbidden_payload
    - visual_reconstruction_unsafe_validated_status

confidence:
  defaults:
    validated: 0.80
    pending validation: 0.45
    hypothesis: 0.30
  feedback_types:
    - useful
    - wrong
    - outdated
    - needs_review

status_values:
  core:
    - validated
    - hypothesis
    - pending validation
  asset_evolution:
    - candidate
    - reviewed
    - reusable
    - deprecated
    - replaced

self_evolution:
  workflow_id: self_evolution_loop.v1
  trigger_terms:
    - 自进化
    - 沉淀
    - 更新
    - 更新 harness
    - 写回
    - 写入 harness
    - 知识库
    - 复用
    - 资产化
    - 候选资产
    - 经验沉淀
    - closeout
    - harness closeout
    - 调用历史
    - 查历史
    - 参考之前
    - loop
    - 一键 loop
    - retro
    - 写入知识库
    - 更新知识库
    - 同步 harness
    - 沉淀到 harness
  entry_sequence:
    - recall
    - intake
    - contract
    - candidate_writeback
    - validation
    - next_bottleneck
  restart_files:
    - contract.yaml
    - state.json
    - trace.jsonl
  allowed_auto_status:
    - candidate
    - pending validation
  forbidden_auto_status:
    - validated
    - reusable
    - approved
    - pass
    - paper_ready

knowledge_categories:
  - system_engineering
  - 3d_reconstruction
  - mie_scattering
  - image_processing
  - scientific_visualization
  - paper_writing
  - experimental_system
  - mechanical_modeling

prompt_categories:
  - codex
  - claude
  - chatgpt
  - visual_to_editable
  - scientific_visualization
  - paper_writing
  - project_review
  - cad_mechanical_modeling

rules:
  no_large_data_in_knowledge: true
  no_literature_pdf_originals_in_reusable_knowledge: true
  small_paper_manuscript_figures_and_submission_default_to_docs_root: true
  resevo_only_stores_templates_workflows_indexes_and_decisions_for_papers: true
  resevo_brand_name: true
  visual_refs_require_figure_card: true
  paper_contract_required_for_paper_outputs: true
  no_legacy_move_or_delete_without_explicit_request: true
  closeout_required_after_research_task: true
  closeout_required_for_all_g_workspace_tasks: true
  harness_phrase_resolves_to_configured_engine_root: true
  never_write_harness_assets_to_knowledge_underscore_harness: true
  sqlite_fts5_is_canonical_search: true
  openviking_is_not_canonical_search: true
  asset_evolution_default_status: candidate
  self_evolution_loop_enabled: true
  self_evolution_candidate_first: true
  self_evolution_requires_agent_generated_intake: true
  visual_to_editable_router_enabled: true
  visual_to_editable_external_execution_only: true
  visual_to_editable_no_vendored_external_skills: true
  visual_to_editable_requires_prompt_manifest_qa_reproduction: true
  visual_to_editable_forbid_committed_raw_visual_payloads: true
  auto_safe_fixes_enabled: true
  auto_safe_fix_allowlist:
    - fill_v2_metadata_fields
    - update_reference_counts
    - refresh_last_seen_and_last_checked
    - mark_deterministic_encoding_status
    - bridge_registered_projects
    - rebuild_index_and_reports
  auto_safe_fix_forbidden:
    - change_scientific_claims
    - delete_or_move_files
    - copy_large_experiment_data_to_knowledge
    - promote_pending_validation_to_validated
    - register_unknown_projects_without_explicit_plan
    - self_evolution_promote_to_validated_or_reusable
